name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Install Linting Tools
        run: pip install flake8
      - name: Run Linting
        # Stops the pipeline if code quality check fails
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Pytest
        # Stops the pipeline if tests fail
        run: pytest tests/

  build-and-validate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        # Validates that the Dockerfile is correct
        run: docker build -t my-ml-app:latest .
