apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api-service
  namespace: heart-disease
  labels:
    app: heart-disease-api
spec:
  selector:
    app: heart-disease-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: heart-disease-model-service
  namespace: heart-disease
  labels:
    app: heart-disease-model-service
spec:
  selector:
    app: heart-disease-model-service
  ports:
    - name: http
      protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: heart-disease-dashboard-service
  namespace: heart-disease
  labels:
    app: heart-disease-dashboard
spec:
  selector:
    app: heart-disease-dashboard
  ports:
    - name: http
      protocol: TCP
      port: 8501
      targetPort: 8501
  type: NodePort
